<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Chat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e0f;
    --surface: #17171a;
    --border: #2a2a30;
    --accent: #c8f060;
    --accent-dim: #9ab840;
    --text: #e8e8ec;
    --muted: #6b6b78;
    --user-bg: #1e1e24;
    --ai-bg: #131316;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .doc-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent-dim);
    background: rgba(200,240,96,0.08);
    border: 1px solid rgba(200,240,96,0.15);
    border-radius: 20px;
    padding: 4px 10px;
  }
  .doc-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

  /* Chat */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--muted);
    text-align: center;
    animation: fadeUp 0.4s ease;
  }
  .empty-state .big {
    font-family: 'DM Serif Display', serif;
    font-size: 2.5rem;
    color: rgba(200,240,96,0.15);
  }
  .empty-state p { font-size: 0.85rem; max-width: 300px; line-height: 1.8; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 720px;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user { align-self: flex-end; }
  .msg.ai   { align-self: flex-start; }

  .msg-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0 4px;
  }
  .msg.user .msg-label { text-align: right; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid var(--border);
    border-bottom-right-radius: 4px;
  }
  .msg.ai .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid rgba(200,240,96,0.08);
    border-bottom-left-radius: 4px;
  }
  .msg.ai .msg-bubble.thinking { color: var(--muted); font-style: italic; }

  .rag-note {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent-dim);
    padding: 0 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .rag-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

  /* Input */
  .input-bar {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    flex-shrink: 0;
  }

  /* PDF attach button */
  .attach-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 40px;
    height: 40px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    position: relative;
  }
  .attach-btn:hover { border-color: var(--accent); color: var(--accent); }
  .attach-btn .badge {
    position: absolute;
    top: -5px; right: -5px;
    background: var(--accent);
    color: #0e0e0f;
    font-size: 0.55rem;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    border-radius: 10px;
    padding: 1px 4px;
    display: none;
  }
  #fileInput { display: none; }

  #userInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 300;
    outline: none;
    resize: none;
    line-height: 1.5;
    max-height: 120px;
    transition: border-color 0.2s;
  }
  #userInput:focus { border-color: var(--accent); }
  #userInput::placeholder { color: var(--muted); }

  #sendBtn {
    background: var(--accent);
    color: #0e0e0f;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  #sendBtn:hover { background: var(--accent-dim); }
  #sendBtn:active { transform: scale(0.95); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.8rem;
    padding: 8px 16px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">RAG Chat</div>
  <div class="doc-badge" id="docBadge" style="display:none">
    <span class="doc-dot"></span>
    <span id="docBadgeText"></span>
  </div>
</header>

<div id="messages">
  <div class="empty-state" id="emptyState">
    <div class="big">✦</div>
    <p>Adjunta documentos PDF con el clip y hazme preguntas sobre su contenido.</p>
  </div>
</div>

<div class="input-bar">
  <button class="attach-btn" id="attachBtn" title="Adjuntar PDF">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/>
    </svg>
    <span class="badge" id="attachBadge"></span>
  </button>
  <input type="file" id="fileInput" accept=".pdf" multiple />
  <textarea id="userInput" rows="1" placeholder="Escribe tu pregunta…"></textarea>
  <button id="sendBtn">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </button>
</div>

<div id="toast"></div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const docs = [];
  let history = [];

  // --- PDF handling ---
  document.getElementById('attachBtn').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });

  document.getElementById('fileInput').addEventListener('change', e => {
    handleFiles(e.target.files);
    e.target.value = '';
  });

  // Drag & drop on the whole page (hidden but functional)
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const files = [...e.dataTransfer.files].filter(f => f.name.endsWith('.pdf'));
    if (files.length) handleFiles(files);
  });

  async function handleFiles(files) {
    for (const file of files) {
      if (!file.name.endsWith('.pdf')) continue;
      showToast(`⏳ Procesando ${file.name}…`);
      const text = await extractPdfText(file);
      docs.push({ name: file.name, text });
      showToast(`✓ ${file.name} listo`);
    }
    updateDocBadge();
  }

  async function extractPdfText(file) {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    let full = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      full += content.items.map(it => it.str).join(' ') + '\n';
    }
    return full.trim();
  }

  function updateDocBadge() {
    const badge = document.getElementById('attachBadge');
    const headerBadge = document.getElementById('docBadge');
    const headerText = document.getElementById('docBadgeText');
    if (docs.length === 0) {
      badge.style.display = 'none';
      headerBadge.style.display = 'none';
    } else {
      badge.style.display = 'block';
      badge.textContent = docs.length;
      headerBadge.style.display = 'flex';
      headerText.textContent = `${docs.length} doc${docs.length > 1 ? 's' : ''} cargado${docs.length > 1 ? 's' : ''}`;
    }
  }

  // --- Toast ---
  let toastTimer;
  function showToast(msg, duration = 2500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), duration);
  }

  // --- Chat ---
  const messagesEl = document.getElementById('messages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });
  sendBtn.addEventListener('click', sendMessage);

  function addMsg(role, text) {
    document.getElementById('emptyState')?.remove();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    wrap.innerHTML = `
      <div class="msg-label">${role === 'user' ? 'Tú' : 'Asistente'}</div>
      <div class="msg-bubble${role === 'ai' ? ' thinking' : ''}">${text}</div>
    `;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap.querySelector('.msg-bubble');
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    const bubble = addMsg('ai', '…');

    try {
      const reply = await callWithRetry(docs, history, bubble);
      bubble.classList.remove('thinking');
      bubble.textContent = reply;

      if (docs.length > 0) {
        const note = document.createElement('div');
        note.className = 'rag-note';
        note.innerHTML = `<span class="rag-dot"></span> Basado en tus documentos`;
        bubble.parentElement.appendChild(note);
      }

      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      bubble.classList.remove('thinking');
      bubble.textContent = err.message;
      bubble.style.color = '#f06060';
    }

    sendBtn.disabled = false;
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function callWithRetry(docs, history, bubble, maxRetries = 4) {
    const delays = [3000, 6000, 12000, 20000];
    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ docs, history })
      });

      const data = await resp.json();

      if (data.error) {
        const isOverloaded = data.error.includes('overloaded') || data.error.includes('Overloaded');
        if (isOverloaded && attempt < maxRetries) {
          const wait = delays[attempt];
          bubble.textContent = `Servidor saturado, reintentando en ${wait/1000}s… (${attempt + 1}/${maxRetries})`;
          await new Promise(r => setTimeout(r, wait));
          bubble.textContent = '…';
          continue;
        }
        throw new Error(isOverloaded
          ? 'La API está saturada ahora mismo. Espera unos minutos e inténtalo de nuevo.'
          : data.error);
      }

      return data.reply;
    }
  }
</script>
</body>
</html>
